name: OrangeHRM Selenium E2E

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest

    env:
      APP_URL: https://opensource-demo.orangehrmlive.com/
      BROWSER: chrome
      HEADLESS: true
      REPORT_DIR: ./TestResults
      EXPLICIT_WAIT_SECONDS: 30
      DRIVER_STARTUP_RETRIES: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests in Docker Compose
        run: docker compose up --build --abort-on-container-exit --exit-code-from tests

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-extent-report
          path: TestResults
          if-no-files-found: warn

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-html-report
          path: TestResults/**/ExtentReport.html
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-screenshots
          path: TestResults/**/Screenshots
          if-no-files-found: warn

      - name: Capture Docker Compose logs
        if: always()
        run: |
          mkdir -p ci-logs
          docker compose logs --no-color > ci-logs/docker-compose.log

      - name: Upload Docker Compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-docker-logs
          path: ci-logs/docker-compose.log
          if-no-files-found: warn

      - name: Stop containers
        if: always()
        run: docker compose down --remove-orphans
