name: OrangeHRM Selenium E2E (Enterprise)

on:
workflow_dispatch:
push:
branches: [ main ]
pull_request:

jobs:

smoke-tests:
runs-on: ubuntu-latest

services:
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - 4444:4444
    options: >-
      --shm-size=2g
      --health-cmd="curl -f http://localhost:4444/status"
      --health-interval=5s
      --health-timeout=3s
      --health-retries=20

env:
  HEADLESS: true
  SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
  REPORT_DIR: ${{ github.workspace }}/TestResults/smoke-${{ github.run_number }}

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 8.0.x

  - run: dotnet restore
  - run: dotnet build --no-restore

  - name: Run Smoke Tests
    run: dotnet test --filter "TestCategory=smoke"

regression-tests:
needs: smoke-tests
runs-on: ubuntu-latest

services:
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - 4444:4444
    options: >-
      --shm-size=2g
      --health-cmd="curl -f http://localhost:4444/status"
      --health-interval=5s
      --health-timeout=3s
      --health-retries=20

env:
  HEADLESS: true
  SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
  REPORT_DIR: ${{ github.workspace }}/TestResults/regression-${{ github.run_number }}

steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 8.0.x

  - run: dotnet restore
  - run: dotnet build --no-restore

  - name: Run Regression Tests
    run: dotnet test --filter "TestCategory=regression"

upload-report:
needs: regression-tests
runs-on: ubuntu-latest

steps:
  - uses: actions/upload-artifact@v4
    with:
      name: orangehrm-report-${{ github.run_number }}
      path: TestResults
