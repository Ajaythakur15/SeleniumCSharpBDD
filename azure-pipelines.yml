trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

variables:
  APP_URL: https://opensource-demo.orangehrmlive.com/
  BROWSER: chrome
  HEADLESS: true
  REPORT_DIR: ./TestResults
  EXPLICIT_WAIT_SECONDS: 30
  DRIVER_STARTUP_RETRIES: 3

steps:
  - checkout: self
    clean: true

  - script: |
      docker version
      docker compose version
    displayName: Verify Docker tooling

  - script: docker compose build
    displayName: Build Docker images
    env:
      APP_URL: $(APP_URL)
      BROWSER: $(BROWSER)
      HEADLESS: $(HEADLESS)
      REPORT_DIR: $(REPORT_DIR)
      EXPLICIT_WAIT_SECONDS: $(EXPLICIT_WAIT_SECONDS)
      DRIVER_STARTUP_RETRIES: $(DRIVER_STARTUP_RETRIES)

  - script: docker compose up --abort-on-container-exit --exit-code-from tests
    displayName: Run E2E tests in Docker Compose
    env:
      APP_URL: $(APP_URL)
      BROWSER: $(BROWSER)
      HEADLESS: $(HEADLESS)
      REPORT_DIR: $(REPORT_DIR)
      EXPLICIT_WAIT_SECONDS: $(EXPLICIT_WAIT_SECONDS)
      DRIVER_STARTUP_RETRIES: $(DRIVER_STARTUP_RETRIES)

  - script: |
      mkdir -p ci-logs
      docker compose logs --no-color > ci-logs/docker-compose.log || true
    displayName: Capture Docker Compose logs
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: Publish full test results
    condition: always()
    inputs:
      targetPath: $(Build.SourcesDirectory)/TestResults
      artifact: orangehrm-extent-report
      publishLocation: pipeline

  - task: PublishPipelineArtifact@1
    displayName: Publish HTML report
    condition: always()
    inputs:
      targetPath: $(Build.SourcesDirectory)/TestResults
      artifact: orangehrm-html-report
      publishLocation: pipeline

  - task: PublishPipelineArtifact@1
    displayName: Publish Docker logs
    condition: always()
    inputs:
      targetPath: $(Build.SourcesDirectory)/ci-logs
      artifact: orangehrm-docker-logs
      publishLocation: pipeline

  - script: docker compose down --remove-orphans
    displayName: Stop containers
    condition: always()
