services:
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: orangehrm-selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      SE_NODE_SESSION_TIMEOUT: 120
      SE_NODE_MAX_SESSIONS: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 3s
      retries: 20

  tests:
    build: .
    depends_on:
      selenium:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL:-https://opensource-demo.orangehrmlive.com/}
      BROWSER: ${BROWSER:-chrome}
      HEADLESS: ${HEADLESS:-true}
      REPORT_DIR: /app/TestResults
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
    volumes:
      - ./TestResults:/app/TestResults
